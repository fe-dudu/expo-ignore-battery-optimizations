name: Changesets PR, Publish

on:
  push:
    branches: main

jobs:
  build:
    if: github.repository == 'fe-dudu/expo-ignore-battery-optimizations'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/yarn-setup-node
      - run: yarn install --frozen-lockfile --ignore-scripts
      - run: |
          git config --global user.name "fe-dudu"
          git config --global user.email "ehehwhdwhd@naver.com"
      - name: Changesets PR, Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          version: yarn changeset:version
          publish: yarn changeset:publish
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
